<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyJob — Empleos en México por WhatsApp</title>
    <meta name="description" content="Encuentra empleo en México y postúlate por WhatsApp. Vacantes, ciudades y categorías. Sin registros complicados." />
    <meta name="geo.region" content="MX" />
    <meta name="author" content="MyJob" />
    <meta name="keywords" content="empregos, vagas, México, trabalho, WhatsApp, recrutamento, emprego" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://myjob.com/" />
    <meta property="og:title" content="MyJob — Empleos en México por WhatsApp" />
    <meta property="og:description" content="Encuentra trabajo en México. Vacantes por ciudad y categoría. Postulación directa por WhatsApp." />
    <meta property="og:image" content="https://myjob.com/placeholder.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://myjob.com/" />
    <meta name="twitter:title" content="MyJob — Empleos en México por WhatsApp" />
    <meta name="twitter:description" content="Encuentra trabajo en México. Vacantes por ciudad y categoría. Postulación por WhatsApp." />
    <meta name="twitter:image" content="https://myjob.com/placeholder.svg" />
    
    <!-- Canonical Tag -->
    <link rel="canonical" href="https://myjob.com/" />

    <!-- Site and Organization Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "url": "https://myjob.com/",
          "name": "MyJob",
          "description": "Empleos en México con postulación por WhatsApp.",
          "inLanguage": "es-MX",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://myjob.com/empleos?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "name": "MyJob",
          "url": "https://myjob.com/",
          "logo": "https://myjob.com/brand-logo.jpg"
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
