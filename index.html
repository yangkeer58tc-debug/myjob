<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyJob - Encontre emprego rápido pelo WhatsApp</title>
    <meta name="description" content="Encontre as melhores vagas de emprego no Brasil. Conecte-se diretamente com as empresas via WhatsApp. Rápido, seguro e sem cadastros complicados." />
    <meta name="author" content="MyJob" />
    <meta name="keywords" content="empregos, vagas, trabalho, WhatsApp, Brasil, contratação, recrutamento" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://myjob.com/" />
    <meta property="og:title" content="MyJob - Consiga emprego conversando" />
    <meta property="og:description" content="Conecte-se diretamente com as empresas via WhatsApp. Rápido, seguro e sem cadastros complicados." />
    <meta property="og:image" content="/placeholder.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://myjob.com/" />
    <meta name="twitter:title" content="MyJob - Consiga emprego conversando" />
    <meta name="twitter:description" content="Conecte-se diretamente com as empresas via WhatsApp. Rápido, seguro e sem cadastros complicados." />
    <meta name="twitter:image" content="/placeholder.svg" />
    
    <!-- Canonical Tag -->
    <link rel="canonical" href="https://myjob.com/" />

    <!-- Site and Organization Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "url": "https://myjob.com/",
          "name": "MyJob",
          "description": "Encontre as melhores vagas de emprego no Brasil.",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://myjob.com/vagas?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "name": "MyJob",
          "url": "https://myjob.com/",
          "logo": "https://myjob.com/placeholder.svg"
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
